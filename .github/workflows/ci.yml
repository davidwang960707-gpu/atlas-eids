name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  examples:
    name: Build examples
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/react
          - examples/vue3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.example }}/package.json

      - name: Install dependencies
        run: npm install
        working-directory: ${{ matrix.example }}

      - name: Build example
        run: npm run build
        working-directory: ${{ matrix.example }}
